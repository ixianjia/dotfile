# --- 锁屏 ---
listener {
    timeout = 300                                 # 5 分钟无操作
    on-timeout = loginctl lock-session            # 执行锁屏
}


# --- 关闭显示器 ---
listener {
    timeout = 330                                 # 5.5 分钟无操作（锁屏后 30 秒）
    on-timeout = hyprctl dispatch dpms off        # 关闭显示器（DPMS 信号关闭）
    on-resume = hyprctl dispatch dpms on          # 检测到活动时开启显示器
}


# ============================================================
# 建议添加的配置（已注释，可按需启用）
# ============================================================

# --- 自动休眠 ---
listener {
    timeout = 600                                # 10 分钟无操作
    on-timeout = systemctl suspend               # 系统进入休眠
}

