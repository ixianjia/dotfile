# ============================================================
# Hypridle 配置文件
# ============================================================
# Hypridle 是 Hyprland 的空闲管理守护进程
# 用于在用户无操作一段时间后执行锁屏、息屏、休眠等操作
# ============================================================

# ============================================================
# 通用设置
# ============================================================
general {
    # 锁屏命令：检查是否已有 hyprlock 实例，避免重复启动
    lock_cmd = pidof hyprlock || hyprlock

    # 休眠前锁屏：防止唤醒后未锁屏的安全问题
    before_sleep_cmd = loginctl lock-session

    # 休眠后开启显示器：避免需要按两次键才能亮屏
    after_sleep_cmd = hyprctl dispatch dpms on
}


# ============================================================
# 空闲监听器
# ============================================================
# 每个 listener 定义一个超时时间和对应的操作
# 超时时间单位为秒

