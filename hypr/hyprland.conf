# ============================================================
# Hyprland 配置文件
# ============================================================
# Hyprland 是一个动态平铺 Wayland 合成器
# 支持动画、圆角、模糊等视觉效果
# 配置文档：https://wiki.hyprland.org/
# ============================================================

# ============================================================
# 导入外部配置文件
# ============================================================
# 主题配色：Catppuccin Mocha
source = ~/.config/hypr/themes/mocha.conf
# 显示器配置：分辨率、缩放、位置
source = ~/.config/hypr/monitors.conf


# ============================================================
# XWayland 设置
# ============================================================
# XWayland 用于运行 X11 应用程序
xwayland {
    force_zero_scaling = true     # 让 Hyprland 统一接管缩放，避免 X11 应用模糊
}


# ============================================================
# 常用程序定义（变量）
# ============================================================
$terminal = kitty              # 终端模拟器
$fileManager = dolphin         # 文件管理器
$menu = fuzzel                 # 程序启动器（类似 rofi/wofi）
#$menu = wofi --show drun      # 备用启动器（已注释）


# ============================================================
# 自动启动程序
# ============================================================
# 这些程序会在 Hyprland 启动时自动运行
exec-once = hyprpaper          # 壁纸管理器
exec-once = hypridle           # 空闲管理（锁屏、息屏等）
exec-once = waybar             # 顶部状态栏
exec-once = mako               # 通知守护进程
exec-once = fcitx5 -d --replace  # 中文输入法（守护进程模式）
#exec-once = ~/.config/hypr/scripts/autostart.sh  # 自定义启动脚本（可选）


# ============================================================
# 环境变量
# ============================================================
# 光标大小（X11 和 Wayland 光标）
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Qt/GTK 缩放因子（高 DPI 屏幕适用）
env = QT_SCALE_FACTOR,1
env = GDK_SCALE,1
# Firefox Wayland 支持（已注释，建议启用）
#env = MOZ_ENABLE_WAYLAND,1
# Qt 后端强制使用 XCB（X11），已注释表示使用默认
#env = QT_QPA_PLATFORM,xcb


# ============================================================
# 通用设置
# ============================================================
general {
    gaps_in = 3                # 窗口内边距（窗口之间的间距）
    gaps_out = 7               # 窗口外边距（窗口与屏幕边缘的间距）

    border_size = 2            # 窗口边框宽度

    # 边框颜色（引用主题变量）
    col.active_border=$pink    # 活动窗口边框颜色
    col.inactive_border=$surface0  # 非活动窗口边框颜色

    # 通过边框拖拽调整窗口大小（关闭）
    resize_on_border = false

    # 允许画面撕裂（Tearing）：关闭以避免画面撕裂
    # 如需开启（如游戏），参考：https://wiki.hyprland.org/Configuring/Tearing/
    allow_tearing = false

    # 布局模式：dindle（二叉树平铺）
    # 另一种选择：master（主窗口布局）
    layout = dwindle
}


# ============================================================
# 装饰效果（圆角、透明度、阴影、模糊）
# ============================================================
decoration {
    # 圆角设置
    rounding = 10              # 圆角半径（像素）
    rounding_power = 2         # 圆角曲线强度

    # 窗口透明度
    active_opacity = 1.0       # 活动窗口：100% 不透明
    inactive_opacity = 0.9     # 非活动窗口：90% 不透明（降低可提升性能）

    # 阴影设置
    shadow {
        enabled = true         # 启用阴影
        range = 3              # 阴影扩散范围（减小以提升性能）
        render_power = 2       # 阴影渲染强度（降低以提升性能）
        color = rgba(1a1a1aee) # 阴影颜色（深灰，半透明）
        scale = 0.97           # 阴影缩放（轻微缩小以减少 GPU 负载）
    }

    # 背景模糊设置
    blur {
        enabled = true         # 启用模糊效果
        size = 3               # 模糊半径（减小以提升性能）
        passes = 2             # 模糊通道数（减少以提升性能）
        vibrancy = 0.1696      # 色彩活力（让模糊后的颜色更鲜艳）
        noise = 0.02           # 添加少量噪点以减少模糊伪影
        contrast = 1.0         # 对比度
        brightness = 1.0       # 亮度
        xray = false           # 禁用 X 射线效果（开启会降低性能）
        ignore_opacity = false # 尊重窗口透明度设置
        new_optimizations = true  # 启用新的优化算法
    }
}


# ============================================================
# 动画设置
# ============================================================
animations {
    enabled = yes, please :)   # 启用动画

    # 贝塞尔曲线定义（控制动画速度曲线）
    bezier = easeOutQuint,0.23,1,0.32,1    # 快速开始，缓慢结束
    bezier = easeInOutCubic,0.65,0.05,0.36,1  # 慢-快-慢
    bezier = linear,0,0,1,1    # 匀速
    bezier = almostLinear,0.5,0.5,0.75,1.0  # 近似匀速
    bezier = quick,0.15,0,0.1,1  # 快速响应

    # 动画配置：格式为 animation = 类型, 启用, 持续时间, 曲线, 额外参数
    animation = global, 1, 8, default        # 全局动画时长（8ms）
    animation = border, 1, 4.5, easeOutQuint # 边框动画
    animation = windows, 1, 4.0, easeOutQuint  # 窗口移动/缩放动画
    animation = windowsIn, 1, 3.5, easeOutQuint, popin 87%  # 窗口打开动画
    animation = windowsOut, 1, 1.2, linear, popin 87%  # 窗口关闭动画
    animation = fadeIn, 1, 1.5, almostLinear  # 淡入动画
    animation = fadeOut, 1, 1.2, almostLinear # 淡出动画
    animation = fade, 1, 2.5, quick           # 通用淡入淡出
    animation = layers, 1, 3.2, easeOutQuint  # 图层动画
    animation = layersIn, 1, 3.5, easeOutQuint, fade  # 图层进入
    animation = layersOut, 1, 1.2, linear, fade  # 图层退出
    animation = fadeLayersIn, 1, 1.5, almostLinear  # 图层淡入
    animation = fadeLayersOut, 1, 1.2, almostLinear # 图层淡出
    animation = workspaces, 1, 1.6, almostLinear, fade  # 工作区切换
    animation = workspacesIn, 1, 1.0, almostLinear, fade  # 工作区进入
    animation = workspacesOut, 1, 1.6, almostLinear, fade  # 工作区退出
}


# ============================================================
# Dwindle 布局设置（二叉树平铺）
# ============================================================
dwindle {
    pseudotile = true          # 启用伪平铺（窗口可浮动调整大小）
    preserve_split = true      # 保持分割方向（推荐开启）
}


# ============================================================
# Master 布局设置（主窗口布局）
# ============================================================
master {
    new_status = master        # 新窗口默认成为主窗口
}


# ============================================================
# 杂项设置
# ============================================================
misc {
    force_default_wallpaper = 1  # 使用默认壁纸（0 或 1 禁用动漫壁纸）
    disable_hyprland_logo = true # 禁用随机 Hyprland 标志/动漫女孩背景
}


# ============================================================
# 输入设备设置
# ============================================================
input {
    kb_layout = us             # 键盘布局：美式英语
    kb_variant =               # 键盘变体（空表示默认）
    kb_model =                 # 键盘型号（空表示自动）
    kb_options =               # 键盘选项（如 caps:super 可将 CapsLock 映射为 Super）
    kb_rules =                 # 键盘规则（空表示默认）

    follow_mouse = 1           # 鼠标跟随：1 表示焦点跟随鼠标

    sensitivity = 0            # 鼠标灵敏度：-1.0 到 1.0，0 表示不修改

    # 触摸板设置
    touchpad {
        natural_scroll = false # 自然滚动：关闭（传统滚动方向）
    }
}


# ============================================================
# 手势设置
# ============================================================
gestures {
    workspace_swipe_distance = 300       # 工作区滑动距离（像素）
    workspace_swipe_invert = false       # 反转滑动方向：关闭
    workspace_swipe_min_speed_to_force = 30  # 触发切换的最小速度
    workspace_swipe_cancel_ratio = 0.5   # 取消滑动的比例
    workspace_swipe_create_new = true    # 滑动到边缘时创建新工作区
    workspace_swipe_forever = true       # 允许连续滑动切换多个工作区
}

# 注意：以下手势语法为旧版，新版 Hyprland 可能不兼容
# 新版应通过 bind 绑定手势，而非 gesture 指令
# ===== 四指手势 =====
gesture = 4, horizontal, workspace           # 四指左右滑 → 切换相邻工作区
gesture = 4, pinchin,  fullscreen           # 四指捏合 → 全屏
gesture = 4, pinchout, float                # 四指张开 → 悬浮


# ============================================================
# 特定设备配置
# ============================================================
device {
    name = epic-mouse-v1     # 设备名称（可通过 hyprctl devices 查看）
    sensitivity = -0.5       # 该设备的灵敏度（降低）
}


# ============================================================
# 快捷键绑定
# ============================================================
$mainMod = SUPER             # 主修饰键：Windows/Super 键

# --- 基础程序启动 ---
bind = $mainMod, Return, exec, $terminal        # Super+Enter：打开终端
bind = $mainMod, R, exec, $fileManager          # Super+R：打开文件管理器
bind = $mainMod, space, exec, $menu             # Super+空格：打开程序启动器

# --- 窗口管理 ---
bind = $mainMod, C, killactive,                 # Super+C：关闭当前窗口
bind = $mainMod, M, exit,                       # Super+M：退出 Hyprland

# --- 应用程序快捷启动 ---
bind = $mainMod, W, exec , firefox              # Super+W：Firefox
bind = $mainMod, E, exec , google-chrome-stable --enable-features=UseOzonePlatform --ozone-platform=wayland  # Super+E：Chrome（Wayland 模式）
bind = $mainMod, N, exec , kitty --hold sh -c "nvim"  # Super+N：打开 Neovim
bind = $mainMod, B, exec , kitty --hold sh -c "btop"    # Super+B：打开系统监控

# --- 窗口操作 ---
bind = $mainMod, P, pseudo,                     # Super+P：伪平铺切换
bind = $mainMod, V, togglesplit,                # Super+V：切换分割方向
bind = $mainMod, T, togglefloating,             # Super+T：悬浮模式切换
bind = $mainMod, F, fullscreen,                 # Super+F：全屏切换

# --- 窗口焦点移动 ---
bind = ALT, Tab, cyclenext,                     # Alt+Tab：循环切换窗口
bind = $mainMod, H, movefocus, l                # Super+H：焦点左移
bind = $mainMod, L, movefocus, r                # Super+L：焦点右移
bind = $mainMod, K, movefocus, u                # Super+K：焦点上移
bind = $mainMod, J, movefocus, d                # Super+J：焦点下移
bind = $mainMod, left, movefocus, l             # Super+左箭头：焦点左移
bind = $mainMod, right, movefocus, r            # Super+右箭头：焦点右移
bind = $mainMod, up, movefocus, u               # Super+上箭头：焦点上移
bind = $mainMod, down, movefocus, d             # Super+下箭头：焦点下移

# --- 工作区切换 ---
bind = $mainMod, 1, workspace, 1                # Super+1：切换到工作区 1
bind = $mainMod, 2, workspace, 2                # Super+2：切换到工作区 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10               # Super+0：切换到工作区 10

# --- 移动窗口到工作区 ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1    # Super+Shift+1：移动窗口到工作区 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10   # Super+Shift+0：移动窗口到工作区 10

# --- 特殊工作区（Scratchpad） ---
bind = $mainMod, S, togglespecialworkspace, magic  # Super+S：切换特殊工作区
bind = $mainMod SHIFT, S, movetoworkspace, special:magic  # Super+Shift+S：移动窗口到特殊工作区

# --- 鼠标滚轮切换工作区 ---
bind = $mainMod, mouse_down, workspace, e+1     # Super+滚轮下：下一个工作区
bind = $mainMod, mouse_up, workspace, e-1       # Super+滚轮上：上一个工作区

# --- 鼠标拖拽 ---
bindm = $mainMod, mouse:272, movewindow         # Super+左键拖拽：移动窗口
bindm = $mainMod, mouse:273, resizewindow       # Super+右键拖拽：调整窗口大小

# --- 键盘调整窗口大小 ---
bind = $mainMod SHIFT, H, resizeactive, -20 0   # Super+Shift+H：向左缩小
bind = $mainMod SHIFT, L, resizeactive, 20 0    # Super+Shift+L：向右扩大
bind = $mainMod SHIFT, K, resizeactive, 0 -20   # Super+Shift+K：向上缩小
bind = $mainMod SHIFT, J, resizeactive, 0 20    # Super+Shift+J：向下扩大

# --- 键盘移动窗口 ---
bind = $mainMod ALT, H, movewindow, l           # Super+Alt+H：窗口左移
bind = $mainMod ALT, L, movewindow, r           # Super+Alt+L：窗口右移
bind = $mainMod ALT, K, movewindow, u           # Super+Alt+K：窗口上移
bind = $mainMod ALT, J, movewindow, d           # Super+Alt+J：窗口下移

# --- 电源管理 ---
bind = $mainMod, L, exec, hyprlock              # Super+L：锁屏

# --- 音量控制 ---
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5 && notify-send "🔊音量" "$(pamixer --get-volume-human)"  # 音量加
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5 && notify-send "🔊音量" "$(pamixer --get-volume-human)"  # 音量减
bindel = , XF86AudioMute, exec, pamixer -t && notify-send "🔇 已静音" "$(pamixer --get-volume-human)"  # 静音切换
bind = , XF86AudioMicMute, exec, pamixer --default-source -t && notify-send "🎤麦克风" "$(pamixer --default-source --get-volume-human)"  # 麦克风静音

# --- 亮度控制 ---
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5% && notify-send -a "brightness" -h int:value:$(brightnessctl -m | cut -d, -f4 | tr -d %) "☀️亮度:$(brightnessctl -m | cut -d, -f4)"  # 亮度加
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send -a "brightness" -h int:value:$(brightnessctl -m | cut -d, -f4 | tr -d %) "🌙亮度:$(brightnessctl -m | cut -d, -f4)"  # 亮度减

# --- 媒体控制（需要 playerctl） ---
bindl = , XF86AudioNext, exec, playerctl next        # 下一曲
bindl = , XF86AudioPause, exec, playerctl play-pause # 暂停/播放
bindl = , XF86AudioPlay, exec, playerctl play-pause  # 播放/暂停
bindl = , XF86AudioPrev, exec, playerctl previous    # 上一曲

# --- 截图（使用 hyprshot） ---
bind = $mainMod, PRINT, exec, hyprshot -m window      # Super+Print：截取窗口
bind = , PRINT, exec, hyprshot -m output              # Print：截取屏幕
bind = $shiftMod, PRINT, exec, hyprshot -m region     # Super+Shift+Print：截取区域


# ============================================================
# 窗口规则
# ============================================================

# XWayland 视频桥接修复：隐藏该窗口
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true    # 不自动聚焦
    no_focus = true            # 不可聚焦
    no_anim = true             # 无动画
    no_blur = true             # 无模糊
    max_size = 1 1             # 最大尺寸 1x1
    opacity = 0.0              # 完全透明
}

# 建议添加的窗口规则（已注释，可按需启用）：
# windowrule = suppressevent maximize, class:.*  # 抑制最大化请求
# windowrule = float, title:^(Open File)$        # 文件对话框浮动
# windowrule = float, title:^(Save As)$          # 保存对话框浮动
