# ============================================================
# Hyprlock 配置文件
# ============================================================
# Hyprlock 是 Hyprland 的锁屏程序
# 支持自定义背景、用户信息、时间显示、密码输入框等
# ============================================================

# ============================================================
# 背景设置
# ============================================================
background {
    monitor =                  # 留空表示应用到所有显示器
    path = ~/.config/hypr/hyprlock.png  # 背景图片路径
    blur_passes = 0            # 模糊次数：0 表示不模糊
    contrast = 0.8916          # 对比度：降低背景对比度
    brightness = 0.8916        # 亮度：降低背景亮度
    vibrancy = 0.8916          # 色彩活力：让颜色更鲜艳
    vibrancy_darkness = 0.0    # 暗部活力：0 表示不处理暗部
}


# ============================================================
# 通用设置
# ============================================================
general {
    no_fade_in = false         # 启用淡入动画
    grace = 0                  # 锁屏后无延迟立即要求密码（秒）
    disable_loading_bar = false  # 显示加载进度条
}


# ============================================================
# 用户头像
# ============================================================
image {
    monitor =                  # 留空表示所有显示器
    path = $HOME/.config/hypr/thunder.png  # 头像图片路径
    border_size = 2            # 边框宽度
    border_color = rgba(216, 222, 233, 0.80)  # 边框颜色（浅灰，80% 不透明）
    size = 100                 # 头像尺寸（100x100 像素）
    rounding = -1              # 圆角：-1 表示圆形
    rotate = 0                 # 旋转角度：0 表示不旋转
    reload_time = -1           # 重新加载时间：-1 表示不重新加载
    reload_cmd =               # 重新加载命令：空
    position = 25, 200         # 位置偏移：X=25, Y=200
    halign = center            # 水平对齐：居中
    valign = center            # 垂直对齐：居中
}


# ============================================================
# 用户名标签
# ============================================================
label {
    monitor =
    text = ROG                 # 显示文字：ROG（可改为 $USER 显示实际用户名）
    color = rgba(216, 222, 233, 0.80)  # 文字颜色
    outline_thickness = 0      # 描边宽度：0 表示无描边
    dots_size = 0.2            # 点大小（输入框相关）
    dots_spacing = 0.2         # 点间距
    dots_center = true         # 点居中
    font_size = 20             # 字体大小
    font_family = SF Pro Display Bold  # 字体：SF Pro Display 粗体
    position = 25, 110         # 位置：头像下方
    halign = center            # 水平居中
    valign = center            # 垂直居中
}


# ============================================================
# 时间显示
# ============================================================
label {
    monitor =
    # 动态命令：每秒更新，显示格式为 HH:MM（12 小时制）
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.80)  # 文字颜色
    font_size = 60             # 字体大小：60（大号显示）
    font_family = SF Pro Display Bold  # 字体
    position = 30, -8          # 位置：屏幕中央偏上
    halign = center            # 水平居中
    valign = center            # 垂直居中
}


# ============================================================
# 日期显示
# ============================================================
label {
    monitor =
    # 动态命令：每秒更新，显示格式为 "星期几, 月份 日期"
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, .80)  # 文字颜色
    font_size = 19             # 字体大小：19
    font_family = SF Pro Display Bold  # 字体
    position = 35, -60         # 位置：时间下方
    halign = center            # 水平居中
    valign = center            # 垂直居中
}


# ============================================================
# 用户信息框（背景形状）
# ============================================================
shape {
    monitor =
    size = 320, 55             # 尺寸：宽 320，高 55
    color = rgba(255, 255, 255, 0.1)  # 填充颜色（白色，10% 不透明）
    rounding = -1              # 圆角：-1 表示完全圆角（胶囊形）
    border_size = 0            # 边框宽度：0 表示无边框
    border_color = rgba(255, 255, 255, 1)  # 边框颜色
    rotate = 0                 # 旋转角度
    xray = false               # X 射线模式：关闭（开启会挖空背景）

    position = 34, -190        # 位置：时间上方
    halign = center            # 水平居中
    valign = center            # 垂直居中
}


# ============================================================
# 用户信息文字（显示在用户信息框内）
# ============================================================
label {
    monitor =
    text =     $USER          # 显示图标和用户名（ 是 FontAwesome 用户图标）
    color = rgba(216, 222, 233, 0.80)  # 文字颜色
    outline_thickness = 0      # 无描边
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    font_size = 16             # 字体大小：16
    font_family = SF Pro Display Bold  # 字体
    position = 38, -190        # 位置：与用户信息框重叠
    halign = center            # 水平居中
    valign = center            # 垂直居中
}


# ============================================================
# 密码输入框
# ============================================================
input-field {
    monitor =
    size = 320, 55             # 输入框尺寸：与用户信息框相同
    outline_thickness = 0      # 无外描边
    dots_size = 0.2            # 密码点大小
    dots_spacing = 0.2         # 密码点间距
    dots_center = true         # 密码点居中
    outer_color = rgba(255, 255, 255, 0)  # 外框颜色（透明）
    inner_color = rgba(255, 255, 255, 0.1)  # 内部填充颜色（白色，10% 不透明）
    font_color = rgb(200, 200, 200)  # 输入文字颜色
    fade_on_empty = false      # 空输入时不淡出
    font_family = SF Pro Display Bold  # 字体
    # 占位符文字：支持 HTML 格式
    placeholder_text = <i><span foreground="##ffffff99">🔒  Enter Pass</span></i>
    hide_input = false         # 不隐藏输入（显示密码点而非星号）
    position = 34, -268        # 位置：最上方
    halign = center            # 水平居中
    valign = center            # 垂直居中
}
