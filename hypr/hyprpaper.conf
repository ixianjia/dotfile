# ============================================================
# Hyprpaper 配置文件
# ============================================================
# Hyprland 的官方壁纸管理器
# 支持多显示器设置不同壁纸
# ============================================================

# ============================================================
# 壁纸设置
# ============================================================
# 格式：wallpaper = 显示器, 壁纸路径
# 或使用块语法（推荐，支持更多选项）

# --- 旧版语法（已注释） ---
#preload = ~/.config/hypr/wallpaper.png
#wallpaper = eDP-1,~/.config/hypr/wallpaper.png
#wallpaper = HDMI-A-1,~/.config/hypr/wallpaper.png

# --- 新版块语法 ---
# 内置显示器（笔记本屏幕）
wallpaper {
    monitor = eDP-1            # 显示器名称（可通过 hyprctl monitors 查看）
    path = ~/.config/hypr/wallpaper.png  # 壁纸路径
    fit_mode = cover           # 适配模式：cover（裁剪填充）、stretch（拉伸）、contain（完整显示）
}

# 外接显示器（HDMI）
wallpaper {
    monitor = HDMI-A-1         # 外接显示器名称
    path = ~/.config/hypr/wallpaper.png  # 壁纸路径（与内置显示器相同）
    fit_mode = cover           # 适配模式
}


# ============================================================
# 建议添加的配置（已注释，可按需启用）
# ============================================================

