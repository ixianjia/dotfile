# ============================================================
# 显示器配置文件
# ============================================================
# 定义 Hyprland 中的显示器设置
# 格式：monitor=名称,分辨率@刷新率,位置,缩放
# ============================================================

# ============================================================
# 内置显示器（笔记本屏幕）
# ============================================================
# eDP-1：内置显示器名称（Embedded DisplayPort）
# 2880x1800：分辨率（2.8K）
# @120.0：刷新率 120Hz
# 0x0：位置偏移（X=0, Y=0，即主屏幕）
# 1.5：缩放比例（1.5 倍，适用于高 DPI 屏幕）
monitor=eDP-1,2880x1800@120.0,0x0,1.5

# ============================================================
# 外接显示器（HDMI）
# ============================================================
# HDMI-A-1：外接显示器名称
# 1920x1080：分辨率（1080P）
# @60.0：刷新率 60Hz
# 1280x0：位置偏移（X=1280, Y=0，位于主屏幕右侧）
# 1.0：缩放比例（1 倍，不缩放）
# monitor=HDMI-A-1,1920x1080@60.0,1280x0,1.0


# ============================================================
# 显示器配置说明
# ============================================================
# 查看可用显示器：hyprctl monitors
# 查看显示器信息：hyprctl monitors all
#
# 缩放比例建议：
#   1.0 - 正常缩放（1080P 及以下）
#   1.25 - 轻微缩放（2K 屏幕）
#   1.5 - 中等缩放（2.8K-3K 屏幕）
#   2.0 - 高缩放（4K 屏幕）
#
# 位置计算：
#   多显示器时，位置 = 前一个显示器的 X + 宽度
#   例如：eDP-1 宽 2880，HDMI 从 X=2880 开始
