# ============================================================
# Catppuccin Mocha 主题配色
# ============================================================
# Catppuccin 是一个社区驱动的柔和主题
# Mocha 是最深色的变体
# 配色文档：https://github.com/catppuccin/catppuccin
# ============================================================

# ============================================================
# 暖色调
# ============================================================
$rosewater = rgb(f5e0dc)         # 玫瑰水（浅粉）
$rosewaterAlpha = f5e0dc         # 玫瑰水（Alpha 通道值）

$flamingo = rgb(f2cdcd)          # 火烈鸟（粉）
$flamingoAlpha = f2cdcd

$pink = rgb(f5c2e7)              # 粉色
$pinkAlpha = f5c2e7

$mauve = rgb(cba6f7)             # 紫红（薰衣草紫）
$mauveAlpha = cba6f7

$red = rgb(f38ba8)               # 红色
$redAlpha = f38ba8

$maroon = rgb(eba0ac)            # 栗色（暗红）
$maroonAlpha = eba0ac

$peach = rgb(fab387)             # 桃色（橙）
$peachAlpha = fab387

$yellow = rgb(f9e2af)            # 黄色
$yellowAlpha = f9e2af

# ============================================================
# 冷色调
# ============================================================
$green = rgb(a6e3a1)             # 绿色
$greenAlpha = a6e3a1

$teal = rgb(94e2d5)              # 青色（蓝绿）
$tealAlpha = 94e2d5

$sky = rgb(89dceb)               # 天蓝
$skyAlpha = 89dceb

$sapphire = rgb(74c7ec)          # 蓝宝石蓝
$sapphireAlpha = 74c7ec

$blue = rgb(89b4fa)              # 蓝色
$blueAlpha = 89b4fa

$lavender = rgb(b4befe)          # 薰衣草（淡紫）
$lavenderAlpha = b4befe

# ============================================================
# 文字颜色（从亮到暗）
# ============================================================
$text = rgb(cdd6f4)              # 主文字（最亮）
$textAlpha = cdd6f4

$subtext1 = rgb(bac2de)          # 副文字 1
$subtext1Alpha = bac2de

$subtext0 = rgb(a6adc8)          # 副文字 0
$subtext0Alpha = a6adc8

# ============================================================
# 覆盖层颜色（从亮到暗）
# ============================================================
$overlay2 = rgb(9399b2)          # 覆盖层 2
$overlay2Alpha = 9399b2

$overlay1 = rgb(7f849c)          # 覆盖层 1
$overlay1Alpha = 7f849c

$overlay0 = rgb(6c7086)          # 覆盖层 0
$overlay0Alpha = 6c7086

# ============================================================
# 表面颜色（从亮到暗）
# ============================================================
$surface2 = rgb(585b70)          # 表面 2
$surface2Alpha = 585b70

$surface1 = rgb(45475a)          # 表面 1
$surface1Alpha = 45475a

$surface0 = rgb(313244)          # 表面 0
$surface0Alpha = 313244

# ============================================================
# 基础背景色（从亮到暗）
# ============================================================
$base = rgb(1e1e2e)              # 基础背景（主背景色）
$baseAlpha = 1e1e2e

$mantle = rgb(181825)            # 披风（更暗的背景）
$mantleAlpha = 181825

$crust = rgb(11111b)             # 外壳（最暗背景）
$crustAlpha = 11111b
