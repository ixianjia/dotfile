# ============================================================
# Kitty 终端配置文件
# ============================================================
# Kitty 是一个基于 GPU 的高速终端模拟器
# 本配置使用 One Dark 配色方案，JetBrainsMono Nerd Font 字体
# ============================================================

# ============================================================
# 核心设置
# ============================================================
# 禁用音频铃声（改为视觉提示或无提示）
enable_audio_bell no

# ============================================================
# 字体设置
# ============================================================
# 主字体：JetBrainsMono Nerd Font（带图标支持）
font_family      JetBrainsMono Nerd Font
# 备用字体：SF Pro（已注释）
#font_family      SF Pro

# 字体大小
font_size        12.0

# 粗体/斜体自动选择
bold_font        auto
italic_font      auto
bold_italic_font auto

# 字体特性：启用 JetBrainsMono 的样式替代
# ss01-ss08 是样式集，改变某些字符的外观
# 建议按需启用，过多可能影响代码可读性
font_features    "JetBrainsMono Nerd Font" +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08

# 行高调整：110% 原始高度
adjust_line_height 110%
# 基线偏移：5 像素
adjust_baseline 5

# ============================================================
# 光标设置
# ============================================================
# 光标颜色（One Dark 蓝色）
cursor                #61afef
# 光标下文字颜色
cursor_text_color     #282c34
# 光标形状：block（方块）、beam（竖线）、underline（下划线）
cursor_shape          block
# 光标闪烁间隔：0.5 秒
cursor_blink_interval 0.5
# 光标拖尾效果：1 表示启用
cursor_trail          1

# ============================================================
# URL 链接设置
# ============================================================
# URL 链接颜色
url_color             #61afef

# ============================================================
# 标签页样式
# ============================================================
# 活动标签页：前景色（文字）/ 背景色
active_tab_foreground   #282c34
active_tab_background   #61afef
# 非活动标签页：前景色 / 背景色
inactive_tab_foreground #abb2bf
inactive_tab_background #3e4452

# ============================================================
# 颜色方案 - One Dark
# ============================================================
# 默认前景色（文字）和背景色
foreground            #abb2bf
background            #282c34

# 选中文本的颜色
selection_foreground  #282c34
selection_background  #61afef

# 16 色调色板（标准 ANSI 颜色）
# 颜色 0-7：标准颜色（暗色）
color0  #282c34   # 黑色（背景色）
color1  #e06c75   # 红色
color2  #98c379   # 绿色
color3  #e5c07b   # 黄色
color4  #61afef   # 蓝色
color5  #c678dd   # 品红
color6  #56b6c2   # 青色
color7  #abb2bf   # 白色（前景色）

# 颜色 8-15：明亮颜色（亮色）
color8  #5c6370   # 亮黑色
color9  #e06c75   # 亮红色
color10 #98c379   # 亮绿色
color11 #e5c07b   # 亮黄色
color12 #61afef   # 亮蓝色
color13 #c678dd   # 亮品红
color14 #56b6c2   # 亮青色
color15 #ffffff   # 亮白色

# ============================================================
# 窗口设置
# ============================================================
# 背景透明度：0.95（95% 不透明）
background_opacity 0.95
# 窗口内边距：文字与窗口边界的距离
window_padding_width 12
# 窗口边框宽度
window_border_width 2
# 活动窗口边框颜色
active_border_color #61afef
# 非活动窗口边框颜色
inactive_border_color #3e4452
# 隐藏窗口装饰（标题栏等）
hide_window_decorations yes
# 窗口外边距：窗口之间的间距
window_margin_width 0
# 窗口垂直内边距
window_padding_height 12

# ============================================================
# 回滚（历史记录）设置
# ============================================================
# 回滚行数：50000 行（占用较多内存，可降至 10000-20000）
scrollback_lines 50000
# 鼠标滚轮滚动倍数
wheel_scroll_multiplier 5
# 回滚查看器：使用 less 命令
scrollback_pager less -R -F -K
# 回滚历史文件大小：0 表示不限制
scrollback_pager_history_size 0
# 滚动条边距
scrollbar_margin_width 0
# 滚动条填充颜色
scrollbar_fill_color #61afef
# 滚动条背景颜色
scrollbar_background_color #3e4452

# ============================================================
# 性能优化设置
# ============================================================
# 重绘延迟：0 表示立即重绘（最低延迟）
repaint_delay 0
# 输入延迟：0 表示立即处理输入（最低延迟）
input_delay 0
# 同步到显示器：启用垂直同步，防止画面撕裂
sync_to_monitor yes
# 视觉铃声持续时间：0 表示禁用
visual_bell_duration 0

# ============================================================
# 高级视觉效果
# ============================================================
# 背景模糊：0 表示禁用（启用会降低性能）
background_blur 0
# 背景图片：无
background_image none

# ============================================================
# 标签栏样式
# ============================================================
# 标签栏风格：powerline（箭头风格）
tab_bar_style powerline
# Powerline 箭头样式：slanted（斜角）
tab_powerline_style slanted
# 标签页标题模板：{索引}:{标题}
tab_title_template "{index}:{title}"

# ============================================================
# 快捷键绑定
# ============================================================
# Ctrl+C：复制选中内容 / 中断进程
map ctrl+c copy_or_interrupt
# Ctrl+V：从剪贴板粘贴
map ctrl+v paste_from_clipboard

# ============================================================
# 视觉效果（部分与上方重复，可清理）
# ============================================================
# 选中文本颜色（与上方 38-39 行重复）
selection_background #61afef
selection_foreground #282c34
# URL 样式：double（双下划线）
url_style double
# 可识别的 URL 前缀协议
url_prefixes file ftp ftps gemini git gopher http https irc ircs mailto sftp ssh

# ============================================================
# 鼠标设置
# ============================================================
# 鼠标隐藏等待时间：3 秒无操作后隐藏光标
mouse_hide_wait 3
# URL 颜色（与第 27 行重复）
url_color #61afef
# URL 样式（与第 99 行重复）
url_style double
